<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>عيد مبارك - رج الموبايل يعمل</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- خطوط عربية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fefcf5;
            background-image: 
                linear-gradient(45deg, rgba(212, 175, 55, 0.03) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(212, 175, 55, 0.03) 25%, transparent 25%);
            background-size: 40px 40px;
            font-family: 'Tajawal', 'Amiri', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 0.8rem;
            -webkit-tap-highlight-color: transparent;
        }

        /* زخارف خلفية ذهبية ناعمة */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.12) 0px, transparent 18px),
                radial-gradient(circle at 90% 65%, rgba(212, 175, 55, 0.12) 0px, transparent 22px),
                radial-gradient(circle at 30% 80%, rgba(0, 0, 0, 0.02) 0px, transparent 28px);
            pointer-events: none;
            z-index: 0;
        }

        /* فوانيس جانبية */
        .lantern-left, .lantern-right {
            position: absolute;
            bottom: 15px;
            font-size: clamp(2.8rem, 10vw, 4rem);
            color: #d4af37;
            filter: drop-shadow(2px 4px 0 #00000015) drop-shadow(0 0 8px #ffd966);
            z-index: 5;
            animation: swing 3.5s infinite ease-in-out;
            opacity: 0.9;
            pointer-events: none;
        }
        .lantern-left {
            left: 5px;
            transform-origin: top center;
        }
        .lantern-right {
            right: 5px;
            transform-origin: top center;
            animation-delay: 0.6s;
        }
        @keyframes swing {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        /* ===== شاشة البداية (الغلاف) ===== */
        .cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(254, 252, 245, 0.97);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .cover-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .cover-icon {
            font-size: 5rem;
            color: #b8860b;
            margin-bottom: 2rem;
            animation: gentle-shake 2s infinite ease-in-out;
        }
        @keyframes gentle-shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .cover-message {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2a1f0c;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .cover-message i {
            color: #b8860b;
            margin: 0 0.5rem;
        }

        .shake-hint {
            font-size: 1.3rem;
            color: #5a4a2a;
            margin-bottom: 2.5rem;
            background: rgba(212, 175, 55, 0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            border: 1px dashed #b8860b;
        }

        .cover-button {
            background: #b8860b;
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.8rem;
            border-radius: 60px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            box-shadow: 0 8px 0 #5e4a1e, 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid #d4af37;
        }
        .cover-button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #5e4a1e, 0 5px 15px rgba(0,0,0,0.2);
        }

        /* البطاقة الرئيسية (مخفية) */
        .eid-card {
            position: relative;
            z-index: 15;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 3px solid #d4af37;
            border-radius: 50px 50px 50px 50px / 40px 40px 40px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 0 0 3px #f5f0e1 inset, 0 0 25px #b8860b80;
            padding: 1.8rem 1.2rem;
            text-align: center;
            color: #1e1e1e;
            margin: 0 auto;
            display: none; /* مخفية في البداية */
        }

        .card-border-pattern {
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 2px dashed #b8860b;
            border-radius: 45px;
            pointer-events: none;
            opacity: 0.6;
        }

        .title-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .title-decoration .line {
            height: 2px;
            width: 70px;
            background: linear-gradient(90deg, transparent, #b8860b, #000000, #b8860b, transparent);
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: clamp(2.4rem, 10vw, 3.8rem);
            font-weight: 900;
            margin: 0.2rem 0;
            text-shadow: 2px 2px 0 #f3e6c0, 4px 4px 0 rgba(0,0,0,0.1);
            line-height: 1.3;
            color: #2a1f0c;
        }

        .sub-message {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 700;
            margin: 0.8rem 0 1.5rem;
            background: linear-gradient(145deg, #b8860b, #2a1f0c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 8px rgba(212, 175, 55, 0.4);
        }

        .divider {
            width: 60%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #b8860b, #b8860b 10px, #2a1f0c 10px, #2a1f0c 18px);
            margin: 1.5rem auto;
        }

        .heart-message {
            font-size: clamp(1.3rem, 5vw, 1.7rem);
            font-weight: 500;
            margin: 1rem 0 1.2rem;
            background-color: #fbf7ed;
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            display: inline-block;
            border: 2px solid #d4af37;
            color: #2a1f0c;
            box-shadow: 0 5px 0 #00000015;
            line-height: 1.5;
            max-width: 95%;
        }

        .team-tag {
            margin-top: 18px;
            font-size: clamp(1.2rem, 4.5vw, 1.4rem);
            color: #b8860b;
            font-weight: 500;
            background: #ffffffcc;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #2a1f0c;
            box-shadow: 0 4px 0 #00000015;
            line-height: 1.4;
        }

        /* زخارف خلفية كثيفة */
        .extra-decor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        .extra-decor i {
            position: absolute;
            color: rgba(184, 134, 11, 0.12);
            font-size: 5rem;
        }
        .extra-decor i:nth-child(1) { top: 2%; left: 3%; font-size: 7rem; }
        .extra-decor i:nth-child(2) { top: 15%; right: 8%; font-size: 6.5rem; }
        .extra-decor i:nth-child(3) { bottom: 10%; left: 12%; font-size: 8rem; }
        .extra-decor i:nth-child(4) { top: 30%; right: 20%; font-size: 5.5rem; }
        .extra-decor i:nth-child(5) { bottom: 25%; right: 15%; font-size: 7.2rem; }
        .extra-decor i:nth-child(6) { top: 60%; left: 5%; font-size: 6rem; }
        .extra-decor i:nth-child(7) { top: 75%; right: 25%; font-size: 8.5rem; }
        .extra-decor i:nth-child(8) { bottom: 5%; left: 20%; font-size: 5.8rem; }
        .extra-decor i:nth-child(9) { top: 45%; left: 30%; font-size: 7.8rem; }
        .extra-decor i:nth-child(10) { top: 85%; right: 5%; font-size: 6.2rem; }

        /* شريط التكبيرات */
        .takbeer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: #2a1f0c;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            z-index: 20;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            padding: 0.7rem 0.5rem;
            border-top: 2px solid #d4af37;
            font-weight: 500;
            width: 100%;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            line-height: 1.5;
            display: none;
        }
        body { padding-bottom: 60px; }
    </style>
</head>
<body>

    <div class="lantern-left"><i class="fas fa-lantern"></i></div>
    <div class="lantern-right"><i class="fas fa-lantern"></i></div>

    <div class="extra-decor">
        <i class="fas fa-mosque"></i> <i class="fas fa-star-and-crescent"></i> <i class="fas fa-mosque"></i> <i class="fas fa-star-and-crescent"></i> <i class="fas fa-mosque"></i> <i class="fas fa-star-and-crescent"></i> <i class="fas fa-mosque"></i> <i class="fas fa-star-and-crescent"></i> <i class="fas fa-mosque"></i> <i class="fas fa-star-and-crescent"></i> <i class="fas fa-mosque"></i> <i class="fas fa-star-and-crescent"></i>
    </div>

    <!-- شاشة البداية -->
    <div class="cover-screen" id="coverScreen">
        <div class="cover-icon"><i class="fas fa-mobile-alt"></i></div>
        <div class="cover-message">
            <i class="fas fa-hand-point-right"></i> رج الموبايل <i class="fas fa-hand-point-left"></i>
        </div>
        <div class="shake-hint">
            <i class="fas fa-arrows-alt"></i> أو دوس هنا <i class="fas fa-arrow-down"></i>
        </div>
        <button class="cover-button" id="showCardBtn">
            <i class="fas fa-hand-pointer"></i> دوس هنا
        </button>
        <p id="iosPermissionMsg" style="margin-top: 20px; color: #b8860b; font-size: 1.2rem; display: none;">
            ⚡ اضغط على "سماح" إذا طلب المتصفح الإذن
        </p>
    </div>

    <!-- البطاقة المخفية -->
    <div class="eid-card" id="eidCard">
        <div class="card-border-pattern"></div>
        <div class="title-decoration"><span class="line"></span></div>
        <h1>كل عام وأنتم بخير</h1>
        <div class="sub-message">فخورين بوجودكم معانا</div>
        <div class="divider"></div>
        <div class="heart-message">عيد مبارك تقبل الله منا ومنكم</div>
        <div class="team-tag">فريق العمل</div>
    </div>

    <div class="takbeer" id="takbeer">الله أكبر الله أكبر لا إله إلا الله والله أكبر الله ولله الحمد</div>

    <script>
        (function() {
            const coverScreen = document.getElementById('coverScreen');
            const eidCard = document.getElementById('eidCard');
            const takbeer = document.getElementById('takbeer');
            const showBtn = document.getElementById('showCardBtn');
            const iosMsg = document.getElementById('iosPermissionMsg');

            // متغير لتخزين دالة معالجة الهز
            let motionHandler = null;

            // دالة إظهار البطاقة وإخفاء الغلاف
            function showCard() {
                if (!coverScreen.classList.contains('hidden')) {
                    coverScreen.classList.add('hidden');
                    eidCard.style.display = 'block';
                    takbeer.style.display = 'block';
                }
            }

            // دالة طلب الإذن وإعداد مستمع الهز (لـ iOS)
            function setupShake() {
                if (window.DeviceMotionEvent) {
                    // تحقق إذا كان الطلب بالـ Permission مطلوباً (iOS 13+)
                    if (typeof DeviceMotionEvent.requestPermission === 'function') {
                        iosMsg.style.display = 'block'; // تلميح للمستخدم
                        DeviceMotionEvent.requestPermission()
                            .then(response => {
                                iosMsg.style.display = 'none';
                                if (response === 'granted') {
                                    // تم منح الإذن، نضيف المستمع
                                    window.addEventListener('devicemotion', handleMotion);
                                } else {
                                    console.log('Permission denied');
                                }
                            })
                            .catch(err => {
                                iosMsg.style.display = 'none';
                                console.error('Permission error:', err);
                            });
                    } else {
                        // الأندرويد وباقي المتصفحات: نضيف المستمع مباشرة
                        window.addEventListener('devicemotion', handleMotion);
                    }
                } else {
                    console.log('DeviceMotionEvent غير مدعوم');
                }
            }

            // معالج الهز
            function handleMotion(event) {
                const acceleration = event.acceleration || event.accelerationIncludingGravity;
                if (!acceleration) return;

                const threshold = 12; // حساسية منخفضة (أسهل للهز)
                const { x, y, z } = acceleration;

                // نحتاج لقيم سابقة للمقارنة
                if (typeof handleMotion.lastX === 'undefined') {
                    handleMotion.lastX = x;
                    handleMotion.lastY = y;
                    handleMotion.lastZ = z;
                    return;
                }

                const deltaX = Math.abs(x - handleMotion.lastX);
                const deltaY = Math.abs(y - handleMotion.lastY);
                const deltaZ = Math.abs(z - handleMotion.lastZ);
                const shake = deltaX + deltaY + deltaZ;

                if (shake > threshold) {
                    showCard();
                }

                handleMotion.lastX = x;
                handleMotion.lastY = y;
                handleMotion.lastZ = z;
            }

            // عند تحميل الصفحة، نحاول طلب الإذن إذا كان iOS
            // لكن iOS يتطلب تفاعل المستخدم، لذلك سنطلب عند أول نقرة على الشاشة
            function requestPermissionOnFirstClick() {
                // إزالة المستمع بعد أول مرة
                document.removeEventListener('click', requestPermissionOnFirstClick);
                setupShake();
            }

            // إذا كان iOS ننتظر أول نقرة، وإلا نضبط مباشرة
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                // iOS: ننتظر أول نقرة في أي مكان
                document.addEventListener('click', requestPermissionOnFirstClick);
            } else {
                // أندرويد: نضبط مباشرة
                setupShake();
            }

            // الزر الرئيسي
            showBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // منع تضارب مع مستمع النقر العام
                showCard();
            });

            // في حالة iOS، أول نقرة ستطلب الإذن ثم تعرض البطاقة إذا هز المستخدم
            // نضيف أيضاً إمكانية ظهور البطاقة بالزر كما هو
        })();
    </script>
</body>
</html>
